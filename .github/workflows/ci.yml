name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-luatex texlive-latex-base texlive-latex-recommended poppler-utils ripgrep
      - name: Compile all examples
        run: tests/compile-all.sh
